name: Container Build & DAST

on:
  workflow_dispatch:
  workflow_call:

jobs:
  container-dast:
    name: Build, Scan & DAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: projecttracker-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy container image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'projecttracker-app:latest'
          format: 'sarif'
          output: 'container-scan.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload container scan SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'container-scan.sarif'
          category: 'container-trivy'

      - name: Upload container scan SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-sarif
          path: container-scan.sarif

      - name: Start application
        env:
          APP_IMAGE: projecttracker-app:latest
        run: docker compose up -d

      - name: Wait for application readiness
        run: |
          echo "Waiting for application..."
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Application is reachable."
              exit 0
            fi
            sleep 5
          done
          echo "Application did not become reachable."
          docker compose logs
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        id: zap_scan
        run: |
          docker run --rm \
            --user root \
            --network host \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -m 5 \
            -J zap-report.json \
            -r zap-report.html

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-reports
          path: |
            zap-report.json
            zap-report.html

      - name: Publish ZAP summary
        if: always()
        run: |
          echo "## OWASP ZAP DAST Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f zap-report.html ]; then
            echo "Download full report from artifacts: **zap-dast-reports**" >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Stop application
        if: always()
        run: docker compose down -v --remove-orphans
